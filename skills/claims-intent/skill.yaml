id: claims-intent
version: 0.1.0
name: "Claims Intent Classifier"
description: >
  Classify customer intent on an e-commerce after-sales channel:
  claim_with_image / claim_text_only / general_inquiry / needs_clarification /
  followup_on_prior_claim. Extracts order_id via regex+LLM. Multi-turn aware:
  reads prior conversation history. Recognizes legal-threat-only messages as
  claims (lawyer / regulator / media references).

owner:
  name: "Duan Zhenyue"
  contact: "duanzhenyue@gmail.com"
  wallet: "0x0000000000000000000000000000000000000001"

inputs:
  schema:
    type: object
    required: [user_message]
    properties:
      user_message:
        type: string
        maxLength: 4000
        description: Latest customer message text.
      has_image:
        type: boolean
        default: false
        description: Whether the customer attached an image to this turn.
      history:
        type: array
        default: []
        items:
          type: object
          required: [role, content]
          properties:
            role: { type: string, enum: [user, assistant] }
            content: { type: string }
            decision_summary: { type: string }

outputs:
  schema:
    type: object
    required: [label, confidence]
    properties:
      label:
        type: string
        enum:
          - claim_with_image
          - claim_text_only
          - general_inquiry
          - needs_clarification
          - followup_on_prior_claim
      order_id:
        type: [string, "null"]
      product_hint:
        type: [string, "null"]
      confidence:
        type: number
        minimum: 0
        maximum: 1
      clarification_question:
        type: [string, "null"]

price:
  amount_usdc: 0.01
  chain: base-sepolia

verify_hook:
  module: verify
  function: verify
  invariants:
    - "label is a valid IntentLabel enum value"
    - "confidence within [0, 1]"
    - "if label == needs_clarification, clarification_question is non-null"
    - "if label == claim_with_image but has_image is False, fall back to claim_text_only"

llm_compat:
  - gemini
  - any

tags:
  - vertical:ecom-aftersales
  - capability:nlp
  - capability:intent-classification

reuse_from:
  source: claimsforge
  agent: intent_agent
  path: /Users/duan/code/claimsforge/agents/intent_agent.py
