id: claims-verify
version: 0.1.0
name: "Claims Offer Verifier"
description: >
  Hard-cap the proposed offer to policy max (with up to 20% emotion-driven
  upward flex), escalate to human when damage_confidence < 0.5 and amount > $50,
  request tone revision when justification is too cold. Max 1 revision loop.

owner: { name: "Duan Zhenyue", contact: "duanzhenyue@gmail.com", wallet: "0x0000000000000000000000000000000000000001" }

inputs:
  schema:
    type: object
    required: [offer, damage_severity, damage_confidence, emotion_score]
    properties:
      offer:
        type: object
        required: [offer_type, amount_cents, justification]
      damage_severity: { type: integer, minimum: 0, maximum: 10 }
      damage_confidence: { type: number, minimum: 0, maximum: 1 }
      emotion_score: { type: number, minimum: 0, maximum: 10 }
      user_message: { type: string, default: "" }

outputs:
  schema:
    type: object
    required: [verdict, reason]
    properties:
      verdict: { type: string, enum: [approve, revise, escalate_to_human] }
      reason: { type: string }
      revised_offer: { type: [object, "null"] }

price: { amount_usdc: 0.02, chain: base-sepolia }

verify_hook:
  module: verify
  function: verify
  invariants:
    - "verdict is a valid enum"
    - "if revised_offer present, its amount_cents <= original offer amount_cents"

llm_compat: [gemini, any]
tags: [vertical:ecom-aftersales, capability:verification, capability:safety]
reuse_from: { source: claimsforge, agent: verifier_agent, path: /Users/duan/code/claimsforge/agents/verifier_agent.py }
