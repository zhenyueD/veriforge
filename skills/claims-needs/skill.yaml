id: claims-needs
version: 0.1.0
name: "Claims Needs Discovery"
description: >
  Surface surface/latent/emotional needs from the customer message and
  conversation history. Outputs retention_risk and suggested_offer_bias
  (refund vs replacement vs store-credit vs goodwill). Elevates the system
  from a policy executor to an advisor that catches context like "this mug
  was a birthday gift for Friday".

owner: { name: "Duan Zhenyue", contact: "duanzhenyue@gmail.com", wallet: "0x0000000000000000000000000000000000000001" }

inputs:
  schema:
    type: object
    required: [user_message]
    properties:
      user_message: { type: string, maxLength: 4000 }
      history:
        type: array
        default: []
        items:
          type: object
          required: [role, content]
          properties:
            role: { type: string, enum: [user, assistant] }
            content: { type: string }
      emotion:
        type: [object, "null"]
        description: Optional Emotion object from claims-emotion output

outputs:
  schema:
    type: object
    properties:
      surface_need: { type: string }
      latent_need: { type: string }
      emotional_need: { type: string }
      retention_risk: { type: number, minimum: 0, maximum: 1 }
      upsell_signal: { type: [string, "null"] }
      suggested_offer_bias: { type: [string, "null"] }

price: { amount_usdc: 0.015, chain: base-sepolia }

verify_hook:
  module: verify
  function: verify
  invariants:
    - "retention_risk within [0, 1]"
    - "at least one of surface_need / latent_need / emotional_need is non-empty"

llm_compat: [gemini, any]
tags: [vertical:ecom-aftersales, capability:advisory, capability:nlp]
reuse_from: { source: claimsforge, agent: needs_agent, path: /Users/duan/code/claimsforge/agents/needs_agent.py }
